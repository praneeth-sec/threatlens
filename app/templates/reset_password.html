<!DOCTYPE html>
<html>
<head>
<title>Reset Password - ThreatLens</title>
<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#020617;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
linear-gradient(rgba(0,150,255,0.1) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,150,255,0.1) 1px, transparent 1px);
background-size:50px 50px;
animation:gridMove 20s linear infinite;
z-index:0;
}

@keyframes gridMove{
0%{transform:translate(0,0);}
100%{transform:translate(-50px,-50px);}
}

.container{
background:#1c2e40;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
text-align:center;
position:relative;
z-index:1;
}

.logo{
font-size:28px;
font-weight:bold;
color:#60a5fa;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
background:#0f2437;
color:white;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">ThreatLens</div>
<div class="subtitle">Set your new password</div>

<form method="POST">
<input type="password" name="password" placeholder="New Password" required>
<button type="submit">Reset Password</button>
</form>

</div>

</body>
</html>
