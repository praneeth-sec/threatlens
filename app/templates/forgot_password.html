<!DOCTYPE html>
<html>
<head>
<title>Forgot Password - ThreatLens</title>
<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#020617;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* Grid background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:
linear-gradient(rgba(0,150,255,0.1) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,150,255,0.1) 1px, transparent 1px);
background-size:50px 50px;
animation:gridMove 20s linear infinite;
z-index:0;
}

@keyframes gridMove{
0%{transform:translate(0,0);}
100%{transform:translate(-50px,-50px);}
}

/* Card */

.container{
background:#1c2e40;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
text-align:center;
position:relative;
z-index:1;
}

/* Logo */

.logo{
font-size:28px;
font-weight:bold;
color:#60a5fa;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
font-size:14px;
margin-bottom:25px;
}

/* Input */

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
background:#0f2437;
color:white;
}

/* Button */

button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* Success */

.success{
background:#0d3b1d;
padding:10px;
border-radius:6px;
color:#10b981;
margin-bottom:15px;
font-size:13px;
}

.links{
margin-top:15px;
font-size:13px;
}

.links a{
color:#60a5fa;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">ThreatLens</div>
<div class="subtitle">Reset your account password</div>

{% if success %}
<div class="success">{{ success }}</div>
{% endif %}

<form method="POST">
<input name="email" placeholder="Enter your email" required>
<button type="submit">Send Reset Link</button>
</form>

<div class="links">
<a href="/login">Back to Login</a>
</div>

</div>

</body>
</html>
