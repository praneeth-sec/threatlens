<!DOCTYPE html>
<html>

<head>

<title>CVE Details</title>

<style>

body{
background:#0b1622;
color:white;
font-family:Arial;
padding:40px;
}

.container{
width:70%;
margin:auto;
background:#1c2b3a;
padding:30px;
border-radius:10px;
}

h1{
margin-top:0;
}

.section{
margin-top:25px;
}

.label{
color:#9fb3c8;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>{{ report.cve_id }}</h1>

<div class="section">
<div class="label">Risk Level</div>
<div>{{ report.risk_level }}</div>
</div>

<div class="section">
<div class="label">CVSS Score</div>
<div>{{ report.cvss_score }}</div>
</div>

<div class="section">
<div class="label">Priority</div>
<div>{{ report.priority_score }}</div>
</div>

<div class="section">
<div class="label">Detection Strategy</div>
<div>{{ report.detection_strategy }}</div>
</div>

<div class="section">
<div class="label">Mitigation</div>
<div>{{ report.mitigation }}</div>
</div>

</div>

</body>

</html>
