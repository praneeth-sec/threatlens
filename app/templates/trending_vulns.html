<!DOCTYPE html>
<html>
<head>

<title>Trending Vulnerabilities</title>

<style>

body{
background:#071a2b;
font-family:Arial;
color:white;
}

.container{
width:1100px;
margin:auto;
padding-top:40px;
}

.title{
font-size:30px;
text-align:center;
margin-bottom:40px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th{
background:#1c2e40;
padding:12px;
text-align:left;
}

.table td{
background:#22384e;
padding:12px;
border-bottom:1px solid #1c2e40;
}

.cve{
color:#60a5fa;
font-weight:bold;
}

.cve a:hover{
text-decoration:underline;
}
/* Top Navigation */

.navbar{
width:100%;
background:#0b253d;
padding:15px 0;
margin-bottom:30px;
}

.nav-container{
width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
color:#60a5fa;
}

.dashboard-btn{
background:#3b82f6;
padding:8px 16px;
border-radius:6px;
text-decoration:none;
color:white;
font-size:14px;
}

.dashboard-btn:hover{
background:#2563eb;
}

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#071a2b;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
color:white;
font-size:18px;
}

.spinner{
width:60px;
height:60px;
border:6px solid #1e3a5f;
border-top:6px solid #4ea1ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="navbar">

<div class="nav-container">

<div class="logo">
ThreatLens
</div>

<a href="/dashboard" class="dashboard-btn">
Return to Dashboard
</a>

</div>

</div>

<div class="container">

<div class="title">
Trending Vulnerabilities (CISA KEV)
</div>

<table class="table">

<tr>
<th>CVE</th>
<th>Vendor</th>
<th>Product</th>
<th>Date Added</th>
<th>Required Action</th>
</tr>

{% for v in vulns %}

<tr>

<td class="cve">
<a href="/cve-analyzer/{{ v.cve }}" onclick="showLoader()" style="color:#60a5fa;text-decoration:none;">
{{ v.cve }}
</a>
</td>
<td>{{ v.vendor }}</td>
<td>{{ v.product }}</td>
<td>{{ v.date }}</td>
<td>{{ v.action }}</td>

</tr>

{% endfor %}

</table>

</div>
<div id="loader" class="loader">
<div class="spinner"></div>
<p>Analyzing CVE Intelligence...</p>
</div>

<script>
function showLoader(){
document.getElementById("loader").style.display="flex";
}
</script>
</body>
</html>
